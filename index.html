<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintegra Pro 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --orange: #FF8C00;
            --dark-bg: #000000;
            --card-bg: #111111;
            --gray-border: #333333;
            --text-main: #ffffff;
            --yes: #00FF00;
            --no: #FF0000;
            --blue: #00D1FF;
            --gray-btn: #222222;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: auto; }

        header {
            border-bottom: 2px solid var(--orange);
            padding-bottom: 10px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upload-section {
            background: #151515;
            padding: 25px;
            border: 2px dashed var(--orange);
            text-align: center;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .btn {
            background: var(--orange);
            color: black;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border: none;
            display: inline-block;
            text-decoration: none;
            font-size: 14px;
            text-align: center;
        }

        .btn-secondary { background: #444; color: white; margin-left: 10px; }
        .btn-history { background: transparent; color: var(--orange); border: 1px solid var(--orange); margin-top: 10px; }

        #process-btn.active { background: var(--yes); color: black; }
        #process-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* Estilos do Histórico */
        .history-section {
            background: #0a0a0a;
            border: 1px solid var(--gray-border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #0f0f0f;
        }

        .history-table th {
            text-align: left;
            color: var(--orange);
            border: 1px solid var(--gray-border);
            padding: 12px;
            font-size: 0.85em;
            text-transform: uppercase;
            background: #151515;
        }

        .history-table td {
            padding: 12px;
            border: 1px solid var(--gray-border);
            font-size: 0.95em;
            color: #ffffff; 
        }

        .history-table tr:hover { background: #1a1a1a; }

        .action-btns { display: flex; gap: 12px; justify-content: center; }

        .btn-circle {
            padding: 0;
            background: var(--blue);
            color: #000;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            font-size: 18px;
            transition: all 0.2s;
        }
        .btn-circle:hover { transform: scale(1.15); filter: brightness(1.2); }
        .btn-pdf { background: #ffffff; }

        .company-block {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--gray-border);
        }

        .company-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        .company-title { color: var(--orange); font-size: 1.3em; font-weight: bold; text-transform: uppercase; margin: 0; }
        
        .badge { font-size: 0.7em; padding: 4px 8px; border-radius: 4px; margin-left: 5px; font-weight: bold; border: 1px solid #444; display: inline-block; }
        .badge-regime { background: #1a1a1a; color: var(--blue); }
        .badge-ref { background: #1a1a1a; color: #ffffff; } 

        .uf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .uf-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .uf-sigla { background: var(--orange); color: black; font-weight: 900; padding: 2px 8px; border-radius: 4px; font-size: 1.1em; margin-bottom: 8px; display: inline-block; }
        .status-val { font-weight: 900; font-size: 1.8em; display: block; }
        .venc-val { font-size: 0.9em; color: var(--orange); font-weight: bold; margin-top: 5px; display: block; }
        .reason-val { font-size: 0.8em; color: #ffffff; font-style: italic; font-weight: 500; } 

        .toggle-group { display: flex; gap: 5px; margin-top: 10px; justify-content: center; }
        .toggle-btn {
            font-size: 0.65em;
            padding: 5px 8px;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid #444;
            background: var(--gray-btn);
            color: #ffffff; 
            font-weight: bold;
            flex: 1;
            transition: all 0.2s;
        }
        .toggle-btn.on-gerado { background: #004400; color: #00FF00; border-color: #00FF00; }
        .toggle-btn.on-enviado { background: #004488; color: #00D1FF; border-color: #00D1FF; }

        .green { color: var(--yes); }
        .red { color: var(--no); }

        .hidden { display: none !important; }

        @media print {
            body { background-color: #ffffff; color: #000000; padding: 0; }
            header { border-bottom: 2px solid #000; }
            header h1 { color: #000 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-company { margin-bottom: 20px; font-family: Arial, sans-serif; page-break-inside: avoid; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
            .print-company h3 { font-size: 16px; margin: 0; text-transform: uppercase; }
            .print-company p { font-size: 12px; margin: 3px 0; }
            .print-status { font-weight: bold; font-size: 13px; color: #000; margin-top: 5px; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="color: var(--orange); margin: 0; font-size: 1.5em;">MONITOR SINTEGRA 2026</h1>
        <div id="clock" class="no-print" style="font-family: monospace; font-size: 0.9em; color: white;"></div>
    </header>

    <div class="upload-section no-print">
        <input type="file" id="pdf-input" accept=".pdf" multiple hidden>
        <label for="pdf-input" class="btn">Selecionar PDFs</label>
        <button id="process-btn" class="btn btn-secondary" disabled>Processar</button>
        <button id="print-btn" class="btn hidden" style="background: #ffffff; color: black; margin-left: 10px;">🖨️ Imprimir e Salvar</button>
        <button id="toggle-history" class="btn btn-history">📜 Relatórios Salvos</button>
        <p id="status-msg" style="margin-top: 10px; color: #ffffff; min-height: 1em; font-weight: bold;"></p>
    </div>

    <!-- Seção de Histórico -->
    <div id="history-container" class="history-section no-print hidden">
        <h2 style="font-size: 1.1em; color: var(--orange); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px;">Relatórios Arquivados</h2>
        <table class="history-table">
            <thead>
                <tr>
                    <th style="width: 45%;">Sintegra Enviados</th>
                    <th style="width: 35%;">Referente ao mês</th>
                    <th style="width: 20%; text-align: center;">Ação</th>
                </tr>
            </thead>
            <tbody id="history-list">
                <tr><td colspan="3" style="text-align:center; padding:20px; color:#ffffff;">Aguardando sistema...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="results" class="no-print"></div>

    <div id="print-area" class="print-only"></div>
</div>

<script>
    // --- Lógica de Variáveis Globais ---
    const OBRIGATORIOS = ["AC", "AM", "AP", "DF", "ES", "GO", "MA", "MG", "PA", "PI", "PR", "SC"];
    let consolidado = {};
    let arquivos = [];
    let localHistory = []; // Armazena relatórios na sessão para uso fora do Canvas
    let isCloudActive = false;

    // --- Elementos do DOM ---
    const input = document.getElementById('pdf-input');
    const procBtn = document.getElementById('process-btn');
    const printBtn = document.getElementById('print-btn');
    const historyBtn = document.getElementById('toggle-history');
    const historyContainer = document.getElementById('history-container');
    const historyList = document.getElementById('history-list');
    const status = document.getElementById('status-msg');
    const resultsArea = document.getElementById('results');
    const printArea = document.getElementById('print-area');

    // --- PDF.js Setup ---
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // --- Lógica do Firebase ---
    let db = null;
    let auth = null;
    let appId = 'sintegra-monitor-default';

    async function initCloud() {
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                const firebaseConfig = JSON.parse(__firebase_config);
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();
                if (typeof __app_id !== 'undefined') appId = __app_id;
                
                auth.onAuthStateChanged((user) => { if (user) loadHistory(); });
                
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
                isCloudActive = true;
            } else {
                renderHistoryTable(localHistory);
            }
        } catch (e) { 
            console.warn("Modo local ativo."); 
            renderHistoryTable(localHistory);
        }
    }

    // --- Funções de Interface do Histórico ---
    function renderHistoryTable(docs) {
        historyList.innerHTML = "";
        if (docs.length === 0) {
            historyList.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px; color:white;'>Nenhum histórico salvo nesta sessão.</td></tr>";
            return;
        }

        docs.forEach(data => {
            const tr = document.createElement('tr');
            const dataEnvio = new Date(data.timestamp).toLocaleDateString('pt-BR');
            tr.innerHTML = `
                <td style="font-weight: bold; color: #ffffff;">Sintegra Enviados - ${dataEnvio}</td>
                <td style="color: #ffffff;">${data.globalPeriodo || "N/A"}</td>
                <td style="text-align: center;">
                    <div class="action-btns">
                        <button class="btn-circle" onclick="visualizarRelatorio('${data.id}')" title="Visualizar Detalhes">👁️</button>
                        <button class="btn-circle btn-pdf" onclick="imprimirSalvo('${data.id}')" title="Gerar PDF">📄</button>
                    </div>
                </td>
            `;
            historyList.appendChild(tr);
        });
        window._historyCache = docs;
    }

    async function loadHistory() {
        if (isCloudActive && db) {
            try {
                const col = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('history');
                const snapshot = await col.get();
                const docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                docs.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                renderHistoryTable(docs);
            } catch (e) { console.error(e); }
        } else {
            renderHistoryTable(localHistory);
        }
    }

    globalThis.visualizarRelatorio = function(docId) {
        const data = window._historyCache.find(d => d.id === docId);
        if (data) {
            consolidado = data.consolidado;
            historyContainer.classList.add('hidden');
            resultsArea.classList.remove('hidden');
            renderResults();
            status.innerText = "Relatório carregado do histórico.";
            resultsArea.scrollIntoView({ behavior: 'smooth' });
        }
    }

    globalThis.imprimirSalvo = function(docId) {
        const data = window._historyCache.find(d => d.id === docId);
        if (data) {
            consolidado = data.consolidado;
            renderPrintArea();
            window.print();
        }
    }

    async function autoSaveReport() {
        const first = Object.values(consolidado)[0];
        const ref = first ? first.periodo : "N/A";
        const newDoc = {
            id: 'id_' + Date.now(),
            timestamp: Date.now(),
            globalPeriodo: ref,
            consolidado: JSON.parse(JSON.stringify(consolidado))
        };

        localHistory.unshift(newDoc);
        if (isCloudActive && db) {
            try {
                const col = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('history');
                await col.add(newDoc);
                loadHistory();
            } catch (e) { console.warn("Erro ao salvar nuvem."); }
        } else {
            renderHistoryTable(localHistory);
        }
    }

    // --- Core: Processamento de PDFs ---
    input.addEventListener('change', (e) => {
        arquivos = Array.from(e.target.files);
        if (arquivos.length > 0) {
            status.innerText = arquivos.length + " arquivos selecionados.";
            procBtn.disabled = false;
            procBtn.classList.add('active');
        }
    });

    procBtn.onclick = async () => {
        procBtn.disabled = true;
        procBtn.classList.remove('active');
        consolidado = {};
        resultsArea.innerHTML = "";
        printArea.innerHTML = "";
        resultsArea.classList.remove('hidden');
        historyContainer.classList.add('hidden'); 
        
        try {
            for (let i = 0; i < arquivos.length; i++) {
                status.innerText = `Lendo arquivo ${i + 1} de ${arquivos.length}...`;
                const text = await extractText(arquivos[i]);
                if (text) parseData(text);
            }

            const cnpjs = Object.keys(consolidado);
            if (cnpjs.length === 0) {
                status.innerText = "Nenhum CNPJ encontrado.";
                procBtn.disabled = false;
                return;
            }

            const batchSize = 5;
            for (let i = 0; i < cnpjs.length; i += batchSize) {
                const batch = cnpjs.slice(i, i + batchSize);
                status.innerText = `Consultando empresas... (${Math.min(i + batchSize, cnpjs.length)}/${cnpjs.length})`;
                await Promise.all(batch.map(async (cnpj) => {
                    const dados = await consultarDadosEmpresa(cnpj);
                    if (dados) {
                        consolidado[cnpj].nome = dados.nome;
                        consolidado[cnpj].isSimples = dados.isSimples;
                        consolidado[cnpj].regime = dados.isSimples ? "Simples Nacional" : "Lucro Presumido/Real";
                    }
                }));
                if (i + batchSize < cnpjs.length) await new Promise(r => setTimeout(r, 800));
            }

            renderResults();
            status.innerText = "Processamento finalizado!";
        } catch (error) { 
            console.error(error);
            status.innerText = "Ocorreu um erro no processamento.";
        }
        procBtn.disabled = false;
    };

    async function extractText(file) {
        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjs.getDocument(arrayBuffer).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(s => s.str).join("   ") + "   \n   ";
            }
            return fullText;
        } catch (e) { return ""; }
    }

    function parseData(text) {
        const cnpjs = text.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}/g) || text.match(/\d{14}/g);
        if (!cnpjs) return;
        const partes = text.split(/\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}/);

        for (let i = 0; i < cnpjs.length; i++) {
            const cnpj = cnpjs[i];
            const textoDepois = partes[i + 1] || "";
            const textoAntes = partes[i] || "";

            let periodo = "N/A";
            const pMatch = text.match(/\b(\d{2}\/\d{2}\/\d{4}\s*(?:a|-)\s*\d{2}\/\d{2}\/\d{4})\b/i) || text.match(/\b(0[1-9]|1[0-2])\/\d{4}\b/);
            if (pMatch) periodo = pMatch[0];

            const regexIE = /(?:IE\s*[:\-]?|Inscri[çc][ãa]o\s*(?:Estadual)?\s*[:\-]?|Insc\s*Est\.?\s*[:\-]?)\s*([0-9][\d\.\-\s]{5,20})/i;
            const searchBlock = textoAntes.slice(-150) + " " + textoDepois.slice(0, 200);
            const matchIE = regexIE.exec(searchBlock);
            let ieFound = "";
            if (matchIE) {
                let val = matchIE[1].trim().split(/\s{2,}/)[0];
                ieFound = val.replace(/\D/g, '');
                if (ieFound.startsWith('01') && ieFound.length > 12) ieFound = ieFound.substring(2);
            }

            if (!consolidado[cnpj]) {
                consolidado[cnpj] = { nome: "Identificando...", cnpj, ufs: {}, periodo, isSimples: true, inscricaoEstadual: ieFound };
            } else if (ieFound && !consolidado[cnpj].inscricaoEstadual) {
                consolidado[cnpj].inscricaoEstadual = ieFound;
            }

            const ufRegex = /Estado:\s*([A-Z]{2})/g;
            let m;
            while ((m = ufRegex.exec(textoDepois)) !== null) {
                const uf = m[1].toUpperCase();
                let temIE = !!consolidado[cnpj].inscricaoEstadual;
                if (!temIE) {
                    const trechoUf = textoDepois.slice(m.index, m.index + 200);
                    temIE = regexIE.test(trechoUf);
                }
                if (!consolidado[cnpj].ufs[uf]) {
                    consolidado[cnpj].ufs[uf] = { temIE, gerado: false, enviado: false };
                }
            }
        }
    }

    async function consultarDadosEmpresa(cnpj) {
        const cleanCnpj = cnpj.replace(/\D/g, '');
        const url = `https://brasilapi.com.br/api/cnpj/v1/${cleanCnpj}`;
        for (let t = 1; t <= 3; t++) {
            try {
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    return { nome: data.razao_social || data.nome, isSimples: !!data.opcao_pelo_simples };
                } else if (response.status === 429) await new Promise(r => setTimeout(r, 1500 * t));
                else break;
            } catch (e) { await new Promise(r => setTimeout(r, 1000)); }
        }
        return null;
    }

    globalThis.toggleFlag = function(cnpj, uf, flag) {
        if (consolidado[cnpj] && consolidado[cnpj].ufs[uf]) {
            consolidado[cnpj].ufs[uf][flag] = !consolidado[cnpj].ufs[uf][flag];
            renderResults(); 
        }
    };

    function renderResults() {
        resultsArea.innerHTML = "";
        const empresas = Object.values(consolidado).sort((a, b) => {
            const aT = Object.entries(a.ufs).some(([u, i]) => OBRIGATORIOS.includes(u) && a.isSimples && i.temIE);
            const bT = Object.entries(b.ufs).some(([u, i]) => OBRIGATORIOS.includes(u) && b.isSimples && i.temIE);
            return (bT ? 1 : 0) - (aT ? 1 : 0);
        });

        empresas.forEach(emp => {
            const block = document.createElement('div');
            block.className = 'company-block';
            let ufsHtml = "";
            Object.entries(emp.ufs).sort().forEach(([uf, info]) => {
                const obr = OBRIGATORIOS.includes(uf);
                const isSim = obr && emp.isSimples && info.temIE;
                let razao = !obr ? "UF Dispensada" : (!emp.isSimples ? "Lucro Presumido" : (!info.temIE ? "Sem IE Detectada" : ""));

                ufsHtml += `
                    <div class="uf-card">
                        <span class="uf-sigla">${uf}</span>
                        <span class="status-val ${isSim ? 'green' : 'red'}">${isSim ? 'SIM' : 'NÃO'}</span>
                        <span class="reason-val">${isSim ? 'Obrigatório' : razao}</span>
                        ${isSim ? `<span class="venc-val">Venc: Dia 15</span>
                                   <div class="toggle-group">
                                       <div class="toggle-btn ${info.gerado ? 'on-gerado' : ''}" onclick="toggleFlag('${emp.cnpj}', '${uf}', 'gerado')">${info.gerado ? '✓ Gerado' : 'Gerar'}</div>
                                       <div class="toggle-btn ${info.enviado ? 'on-enviado' : ''}" onclick="toggleFlag('${emp.cnpj}', '${uf}', 'enviado')">${info.enviado ? '✓ Enviado' : 'Enviar'}</div>
                                   </div>` : ''}
                    </div>
                `;
            });

            block.innerHTML = `
                <div class="company-header">
                    <div>
                        <h3 class="company-title">${emp.nome}</h3>
                        <small style="color: #ffffff; font-weight: bold; font-size: 0.85em;">CNPJ: ${emp.cnpj}${emp.inscricaoEstadual ? ` | IE: ${emp.inscricaoEstadual}` : ""}</small>
                    </div>
                    <div>
                        <span class="badge badge-regime">${emp.regime || 'Simples Nacional'}</span>
                        <span class="badge badge-ref">Ref: ${emp.periodo}</span>
                    </div>
                </div>
                <div class="uf-grid">${ufsHtml || '<p style="color:#ffffff;">Nenhum estado detectado.</p>'}</div>
            `;
            resultsArea.appendChild(block);
        });
        if (cnpjsCount() > 0) printBtn.classList.remove('hidden');
    }

    function cnpjsCount() { return Object.keys(consolidado).length; }

    function renderPrintArea() {
        printArea.innerHTML = "";
        Object.values(consolidado).forEach(emp => {
            let ufsTxt = [];
            Object.entries(emp.ufs).sort().forEach(([uf, info]) => {
                if (OBRIGATORIOS.includes(uf) && emp.isSimples && info.temIE) {
                    ufsTxt.push(`${uf}${(info.gerado && info.enviado) ? " ✅" : ""}`);
                }
            });
            if (Object.keys(emp.ufs).length > 0) {
                const ieDisp = emp.inscricaoEstadual ? ` | IE: ${emp.inscricaoEstadual}` : "";
                printArea.innerHTML += `
                    <div class="print-company">
                        <h3>${emp.nome}</h3>
                        <p>CNPJ: ${emp.cnpj}${ieDisp} | Regime: ${emp.regime || 'Simples Nacional'} | Referência: ${emp.periodo}</p>
                        <p class="print-status"><strong>ENTREGA PARA: ${ufsTxt.join(' | ') || 'NENHUMA'}</strong></p>
                    </div>
                `;
            }
        });
    }

    // --- Eventos Finais ---
    historyBtn.onclick = () => {
        const h = historyContainer.classList.toggle('hidden');
        if (!h) { resultsArea.classList.add('hidden'); loadHistory(); }
        else { if (cnpjsCount() > 0) resultsArea.classList.remove('hidden'); }
    };
    
    printBtn.onclick = async () => { renderPrintArea(); await autoSaveReport(); window.print(); };
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
    initCloud();
</script>

</body>
</html>
