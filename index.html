<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintegra Pro 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <!-- Firebase Modular SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, getDocs, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sintegra-pro-2026';
        const authToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        window.firebaseData = { appId, config: firebaseConfig, authToken };
        window.fbSDK = { addDoc, collection, getDocs, doc, query, deleteDoc };
    </script>

    <style>
        :root {
            --orange: #FF8C00;
            --dark-bg: #000000;
            --card-bg: #111111;
            --gray-border: #333333;
            --text-main: #ffffff;
            --yes: #00FF00;
            --no: #FF0000;
            --blue: #00D1FF;
            --gray-btn: #222222;
            --red-delete: #cc0000;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: auto; }

        header {
            border-bottom: 2px solid var(--orange);
            padding-bottom: 10px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upload-section {
            background: #151515;
            padding: 25px;
            border: 2px dashed var(--orange);
            text-align: center;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .btn {
            background: var(--orange);
            color: black;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border: none;
            display: inline-block;
            text-decoration: none;
            font-size: 14px;
            text-align: center;
        }

        .btn-secondary { background: #444; color: white; margin-left: 10px; }
        .btn-history { background: transparent; color: var(--orange); border: 1px solid var(--orange); margin-top: 10px; }

        #process-btn.active { background: var(--yes); color: black; }
        #process-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        .history-section {
            background: #0a0a0a;
            border: 1px solid var(--gray-border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: #0f0f0f;
        }

        .history-table th {
            text-align: left;
            color: var(--orange);
            border: 1px solid var(--gray-border);
            padding: 12px;
            font-size: 0.85em;
            text-transform: uppercase;
            background: #1c1c1c;
        }

        .history-table td {
            padding: 12px;
            border: 1px solid var(--gray-border);
            font-size: 0.95em;
            color: #ffffff; 
        }

        .history-table tr:hover { background: #1a1a1a; }

        .action-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-circle {
            background: var(--blue);
            color: #000;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            font-size: 18px;
            transition: all 0.2s;
        }
        .btn-circle:hover { transform: scale(1.15); filter: brightness(1.2); }
        .btn-pdf { background: #ffffff; }
        .btn-delete { background: var(--red-delete); color: #ffffff; }
        .btn-delete:hover { background: #ff0000; }

        .company-block {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--gray-border);
        }

        .company-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        .company-title { color: var(--orange); font-size: 1.3em; font-weight: bold; text-transform: uppercase; margin: 0; }
        
        .badge { font-size: 0.7em; padding: 4px 8px; border-radius: 4px; margin-left: 5px; font-weight: bold; border: 1px solid #444; display: inline-block; }
        .badge-regime { background: #1a1a1a; color: var(--blue); }
        .badge-ref { background: #1a1a1a; color: #ffffff; } 

        .uf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }

        .uf-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .uf-sigla { background: var(--orange); color: black; font-weight: 900; padding: 2px 8px; border-radius: 4px; font-size: 1.1em; margin-bottom: 8px; display: inline-block; }
        .status-val { font-weight: 900; font-size: 1.8em; display: block; }
        .venc-val { font-size: 0.9em; color: var(--orange); font-weight: bold; margin-top: 5px; display: block; }
        .reason-val { font-size: 0.8em; color: #ffffff; font-style: italic; font-weight: 500; } 

        .toggle-group { display: flex; gap: 5px; margin-top: 10px; justify-content: center; }
        .toggle-btn {
            font-size: 0.65em;
            padding: 5px 8px;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid #444;
            background: var(--gray-btn);
            color: #ffffff; 
            font-weight: bold;
            flex: 1;
            transition: all 0.2s;
        }
        .toggle-btn.on-gerado { background: #004400; color: #00FF00; border-color: #00FF00; }
        .toggle-btn.on-enviado { background: #004488; color: #00D1FF; border-color: #00D1FF; }

        .green { color: var(--yes); }
        .red { color: var(--no); }

        .hidden { display: none !important; }

        @media print {
            body { background-color: #ffffff; color: #000000; padding: 0; }
            header { border-bottom: 2px solid #000; }
            header h1 { color: #000 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-company { margin-bottom: 20px; font-family: Arial, sans-serif; page-break-inside: avoid; border-bottom: 1px dashed #ccc; padding-bottom: 10px; }
            .print-company h3 { font-size: 16px; margin: 0; text-transform: uppercase; }
            .print-company p { font-size: 12px; margin: 3px 0; }
            .print-status { font-weight: bold; font-size: 13px; color: #000; margin-top: 5px; }
        }
        .print-only { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="color: var(--orange); margin: 0; font-size: 1.5em;">MONITOR SINTEGRA 2026</h1>
        <div id="clock" class="no-print" style="font-family: monospace; font-size: 0.9em; color: white;"></div>
    </header>

    <div id="main-ui" class="no-print">
        <div class="upload-section">
            <input type="file" id="pdf-input" accept=".pdf" multiple hidden>
            <label for="pdf-input" class="btn">Selecionar PDFs</label>
            <button id="process-btn" class="btn btn-secondary" disabled>Processar</button>
            <button id="print-btn" class="btn hidden" style="background: #ffffff; color: black; margin-left: 10px;">🖨️ Imprimir e Salvar</button>
            <button id="toggle-history" class="btn btn-history">📜 Relatórios Salvos</button>
            <p id="status-msg" style="margin-top: 10px; color: #ffffff; min-height: 1em; font-weight: bold;"></p>
        </div>
    </div>

    <!-- Seção de Histórico -->
    <div id="history-container" class="history-section no-print hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px;">
            <h2 style="font-size: 1.1em; color: var(--orange); margin: 0;">Relatórios Arquivados</h2>
            <button class="btn" style="padding: 5px 15px; font-size: 12px;" onclick="window.closeHistory()">Voltar</button>
        </div>
        <table class="history-table">
            <thead>
                <tr>
                    <th style="width: 40%;">Sintegra Enviados</th>
                    <th style="width: 30%;">Referente ao mês</th>
                    <th style="width: 30%; text-align: center;">Ação</th>
                </tr>
            </thead>
            <tbody id="history-list">
                <tr><td colspan="3" style="text-align:center; padding:20px; color:#ffffff;">Carregando registros...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="results" class="no-print"></div>

    <div id="print-area" class="print-only"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, doc, addDoc, getDocs, query, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // Lista de Estados Obrigatórios definitiva
    const OBRIGATORIOS = ["AC", "AM", "AP", "DF", "ES", "MA", "MG", "PA", "PI", "PR", "SC"];
    
    let consolidado = {};
    let arquivos = [];
    let db = null;
    let auth = null;
    let userId = null;

    const input = document.getElementById('pdf-input');
    const procBtn = document.getElementById('process-btn');
    const printBtn = document.getElementById('print-btn');
    const historyBtn = document.getElementById('toggle-history');
    const historyContainer = document.getElementById('history-container');
    const historyList = document.getElementById('history-list');
    const resultsArea = document.getElementById('results');
    const status = document.getElementById('status-msg');
    const printArea = document.getElementById('print-area');

    // --- BANCO DE DADOS LOCAL (IndexedDB) ---
    const dbName = "SintegraDatabase";
    const storeName = "SintegraHistory";

    function openLocalDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(dbName, 2);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(storeName)) {
                    db.createObjectStore(storeName, { keyPath: "id" });
                }
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    }

    async function saveLocal(data) {
        const db = await openLocalDB();
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).put(data);
        return new Promise((res) => tx.oncomplete = res);
    }

    async function deleteLocal(id) {
        const db = await openLocalDB();
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).delete(id);
        return new Promise((res) => tx.oncomplete = res);
    }

    async function getLocal() {
        const db = await openLocalDB();
        const tx = db.transaction(storeName, "readonly");
        const store = tx.objectStore(storeName);
        const request = store.getAll();
        return new Promise((res) => request.onsuccess = () => res(request.result));
    }

    // --- INICIALIZAÇÃO FIREBASE ---
    async function initFirebase() {
        const { config, authToken } = window.firebaseData;
        if (!config) {
            loadHistory();
            return;
        }

        try {
            const app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);

            if (authToken) await signInWithCustomToken(auth, authToken);
            else await signInAnonymously(auth);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    userId = user.uid;
                    loadHistory();
                }
            });
        } catch (e) {
            console.error("Firebase Error:", e);
            loadHistory();
        }
    }

    initFirebase();

    // --- LÓGICA DE HISTÓRICO ---
    window.closeHistory = function() {
        historyContainer.classList.add('hidden');
        if (Object.keys(consolidado).length > 0) resultsArea.classList.remove('hidden');
    };

    async function loadHistory() {
        let docs = [];
        if (db && userId) {
            try {
                const appId = window.firebaseData.appId;
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
                const snap = await getDocs(query(colRef));
                snap.forEach(d => docs.push({ id: d.id, ...d.data(), isCloud: true }));
            } catch (e) { console.error("Cloud load fail", e); }
        }

        const locals = await getLocal();
        locals.forEach(l => {
            if (!docs.find(d => d.id === l.id)) docs.push({ ...l, isCloud: false });
        });

        docs.sort((a, b) => b.timestamp - a.timestamp);
        renderHistoryTable(docs);
    }

    function renderHistoryTable(docs) {
        historyList.innerHTML = "";
        if (docs.length === 0) {
            historyList.innerHTML = "<tr><td colspan='3' style='text-align:center; padding:20px; color:white;'>Nenhum relatório salvo.</td></tr>";
            return;
        }

        docs.forEach(data => {
            const tr = document.createElement('tr');
            const dataEnvio = new Date(data.timestamp).toLocaleDateString('pt-BR');
            tr.innerHTML = `
                <td style="font-weight: bold; color: #ffffff;">Sintegra Enviados - ${dataEnvio}</td>
                <td style="color: #ffffff;">${data.globalPeriodo || "N/A"}</td>
                <td style="text-align: center;">
                    <div class="action-btns">
                        <button class="btn-circle" onclick="window.viewReport('${data.id}')" title="Visualizar Detalhes">👁️</button>
                        <button class="btn-circle btn-pdf" onclick="window.printReport('${data.id}')" title="Gerar PDF">📄</button>
                        <button class="btn-circle btn-delete" onclick="window.deleteReport('${data.id}')" title="Excluir">🗑️</button>
                    </div>
                </td>
            `;
            historyList.appendChild(tr);
        });
        window._historyCache = docs;
    }

    window.viewReport = function(id) {
        const data = window._historyCache.find(d => d.id === id);
        if (data) {
            consolidado = data.consolidado;
            historyContainer.classList.add('hidden');
            resultsArea.classList.remove('hidden');
            renderResults();
            status.innerText = "Monitoramento carregado.";
            resultsArea.scrollIntoView({ behavior: 'smooth' });
        }
    };

    window.printReport = function(id) {
        const data = window._historyCache.find(d => d.id === id);
        if (data) {
            consolidado = data.consolidado;
            renderPrintArea();
            window.print();
        }
    };

    window.deleteReport = async function(id) {
        const confirmDelete = confirm("Tem a certeza que deseja excluir este relatório permanentemente?");
        if (!confirmDelete) return;

        await deleteLocal(id);
        if (db && userId) {
            try {
                const appId = window.firebaseData.appId;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'history', id);
                await deleteDoc(docRef);
            } catch (e) { console.warn("Erro ao eliminar da nuvem."); }
        }
        status.innerText = "Relatório excluído.";
        loadHistory();
    };

    async function autoSave() {
        const first = Object.values(consolidado)[0];
        const ref = first ? first.periodo : "N/A";
        const docId = 'sintegra_' + Date.now();
        const docObj = {
            id: docId,
            timestamp: Date.now(),
            globalPeriodo: ref,
            consolidado: JSON.parse(JSON.stringify(consolidado))
        };
        await saveLocal(docObj);
        if (db && userId) {
            try {
                const appId = window.firebaseData.appId;
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'history');
                await addDoc(colRef, docObj);
            } catch (e) {}
        }
        loadHistory();
    }

    // --- PROCESSAMENTO DE PDFS ---
    input.addEventListener('change', (e) => {
        arquivos = Array.from(e.target.files);
        if (arquivos.length > 0) {
            status.innerText = arquivos.length + " arquivos selecionados.";
            procBtn.disabled = false;
            procBtn.classList.add('active');
        }
    });

    procBtn.onclick = async () => {
        procBtn.disabled = true;
        consolidado = {};
        resultsArea.innerHTML = "";
        printArea.innerHTML = "";
        historyContainer.classList.add('hidden');
        resultsArea.classList.remove('hidden');

        try {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

            for (let i = 0; i < arquivos.length; i++) {
                status.innerText = `Lendo PDF ${i + 1} de ${arquivos.length}...`;
                const arrayBuffer = await arquivos[i].arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                let fullText = "";
                for (let p = 1; p <= pdf.numPages; p++) {
                    const page = await pdf.getPage(p);
                    const content = await page.getTextContent();
                    fullText += content.items.map(s => s.str).join("   ") + "   \n";
                }
                parseData(fullText);
            }

            const cnpjs = Object.keys(consolidado);
            if (cnpjs.length === 0) {
                status.innerText = "Nenhum dado encontrado.";
                procBtn.disabled = false;
                return;
            }

            for (let i = 0; i < cnpjs.length; i += 5) {
                const batch = cnpjs.slice(i, i + 5);
                status.innerText = `Consultando empresas... (${Math.min(i + 5, cnpjs.length)}/${cnpjs.length})`;
                await Promise.all(batch.map(async (cnpj) => {
                    const dados = await consultarDadosEmpresa(cnpj);
                    if (dados) {
                        consolidado[cnpj].nome = dados.nome;
                        consolidado[cnpj].isSimples = dados.isSimples;
                        consolidado[cnpj].regime = dados.isSimples ? "Simples Nacional" : "Lucro Presumido/Real";
                    }
                }));
                if (i + 5 < cnpjs.length) await new Promise(r => setTimeout(r, 800));
            }

            renderResults();
            status.innerText = "Processamento finalizado!";
            printBtn.classList.remove('hidden');
        } catch (error) { 
            console.error(error);
            status.innerText = "Erro ao processar.";
        }
        procBtn.disabled = false;
    };

    function parseData(text) {
        const cnpjs = text.match(/\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}/g) || text.match(/\d{14}/g);
        if (!cnpjs) return;
        const partes = text.split(/\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}/);

        for (let i = 0; i < cnpjs.length; i++) {
            const cnpj = cnpjs[i];
            const textoDepois = partes[i + 1] || "";
            const textoAntes = partes[i] || "";

            let periodo = "N/A";
            const pMatch = text.match(/\b(\d{2}\/\d{2}\/\d{4}\s*(?:a|-)\s*\d{2}\/\d{2}\/\d{4})\b/i) || text.match(/\b(0[1-9]|1[0-2])\/\d{4}\b/);
            if (pMatch) periodo = pMatch[0];

            const regexIE = /(?:IE\s*[:\-]?|Inscri[çc][ãa]o\s*(?:Estadual)?\s*[:\-]?|Insc\s*Est\.?\s*[:\-]?)\s*([0-9][\d\.\-\s]{5,20})/i;
            const searchBlock = textoAntes.slice(-150) + " " + textoDepois.slice(0, 200);
            const matchIE = regexIE.exec(searchBlock);
            let ieFound = "";
            if (matchIE) {
                let val = matchIE[1].trim().split(/\s{2,}/)[0];
                ieFound = val.replace(/\D/g, '');
                if (ieFound.startsWith('01') && ieFound.length > 12) ieFound = ieFound.substring(2);
            }

            if (!consolidado[cnpj]) {
                consolidado[cnpj] = { nome: "Identificando...", cnpj, ufs: {}, periodo, isSimples: true, inscricaoEstadual: ieFound };
            } else if (ieFound && !consolidado[cnpj].inscricaoEstadual) {
                consolidado[cnpj].inscricaoEstadual = ieFound;
            }

            const ufRegex = /(?:Estado|UF|Estado:)\s*([A-Z]{2})/gi;
            let m;
            while ((m = ufRegex.exec(textoDepois)) !== null) {
                const uf = m[1].toUpperCase();
                let temIE = !!consolidado[cnpj].inscricaoEstadual;
                if (!temIE) {
                    const trechoUf = textoDepois.slice(m.index, m.index + 200);
                    temIE = regexIE.test(trechoUf);
                }
                if (!consolidado[cnpj].ufs[uf]) {
                    consolidado[cnpj].ufs[uf] = { temIE, gerado: false, enviado: false };
                }
            }
        }
    }

    async function consultarDadosEmpresa(cnpj) {
        const cleanCnpj = cnpj.replace(/\D/g, '');
        const url = `https://brasilapi.com.br/api/cnpj/v1/${cleanCnpj}`;
        try {
            const r = await fetch(url);
            if (r.ok) {
                const d = await r.json();
                return { nome: d.razao_social || d.nome, isSimples: !!d.opcao_pelo_simples };
            }
        } catch (e) {}
        return null;
    }

    window.toggleFlag = function(cnpj, uf, flag) {
        if (consolidado[cnpj] && consolidado[cnpj].ufs[uf]) {
            consolidado[cnpj].ufs[uf][flag] = !consolidado[cnpj].ufs[uf][flag];
            renderResults(); 
        }
    };

    function renderResults() {
        resultsArea.innerHTML = "";
        const empresas = Object.values(consolidado).sort((a, b) => {
            const aT = Object.entries(a.ufs).some(([u, i]) => OBRIGATORIOS.includes(u) && a.isSimples && (i.temIE || !!a.inscricaoEstadual));
            const bT = Object.entries(b.ufs).some(([u, i]) => OBRIGATORIOS.includes(u) && b.isSimples && (i.temIE || !!b.inscricaoEstadual));
            return (bT ? 1 : 0) - (aT ? 1 : 0);
        });

        empresas.forEach(emp => {
            const block = document.createElement('div');
            block.className = 'company-block';
            let ufsHtml = "";
            let qtdSim = 0;

            Object.entries(emp.ufs).sort().forEach(([uf, info]) => {
                const obr = OBRIGATORIOS.includes(uf);
                const temIE = info.temIE || !!emp.inscricaoEstadual;
                const isSim = obr && emp.isSimples && temIE;
                
                if (isSim) qtdSim++;

                let razao = !obr ? "UF Dispensada" : (!emp.isSimples ? "Lucro Presumido" : (!temIE ? "Sem IE Detectada" : ""));

                ufsHtml += `
                    <div class="uf-card">
                        <span class="uf-sigla">${uf}</span>
                        <span class="status-val ${isSim ? 'green' : 'red'}">${isSim ? 'SIM' : 'NÃO'}</span>
                        <span class="reason-val">${isSim ? 'Obrigatório' : razao}</span>
                        ${isSim ? `<span class="venc-val">Venc: Dia 15</span>
                                   <div class="toggle-group">
                                       <div class="toggle-btn ${info.gerado ? 'on-gerado' : ''}" onclick="window.toggleFlag('${emp.cnpj}', '${uf}', 'gerado')">${info.gerado ? '✓ Gerado' : 'Gerar'}</div>
                                       <div class="toggle-btn ${info.enviado ? 'on-enviado' : ''}" onclick="window.toggleFlag('${emp.cnpj}', '${uf}', 'enviado')">${info.enviado ? '✓ Enviado' : 'Enviar'}</div>
                                   </div>` : ''}
                    </div>
                `;
            });

            block.innerHTML = `
                <div class="company-header">
                    <div>
                        <h3 class="company-title">${emp.nome}</h3>
                        <small style="color: #ffffff; font-weight: bold; font-size: 0.85em;">CNPJ: ${emp.cnpj}${emp.inscricaoEstadual ? ` | IE: ${emp.inscricaoEstadual}` : ""} | <span style="color: var(--orange)">QTD: ${qtdSim}</span></small>
                    </div>
                    <div>
                        <span class="badge badge-regime">${emp.regime || 'Simples Nacional'}</span>
                        <span class="badge badge-ref">Ref: ${emp.periodo}</span>
                    </div>
                </div>
                <div class="uf-grid">${ufsHtml || '<p style="color:#ffffff;">Nenhum estado detectado.</p>'}</div>
            `;
            resultsArea.appendChild(block);
        });
    }

    function renderPrintArea() {
        printArea.innerHTML = "";
        Object.values(consolidado).forEach(emp => {
            let ufsTxt = [];
            let qtdSim = 0;
            Object.entries(emp.ufs).sort().forEach(([uf, info]) => {
                const temIE = info.temIE || !!emp.inscricaoEstadual;
                if (OBRIGATORIOS.includes(uf) && emp.isSimples && temIE) {
                    qtdSim++;
                    ufsTxt.push(`${uf}${(info.gerado && info.enviado) ? " ✅" : ""}`);
                }
            });
            if (Object.keys(emp.ufs).length > 0) {
                const ieDisp = emp.inscricaoEstadual ? ` | IE: ${emp.inscricaoEstadual}` : "";
                printArea.innerHTML += `
                    <div class="print-company">
                        <h3>${emp.nome}</h3>
                        <p>CNPJ: ${emp.cnpj}${ieDisp} | QTD: ${qtdSim} | Regime: ${emp.regime || 'Simples Nacional'} | Referência: ${emp.periodo}</p>
                        <p class="print-status"><strong>ENTREGA PARA: ${ufsTxt.join(' | ') || 'NENHUMA'}</strong></p>
                    </div>
                `;
            }
        });
    }

    historyBtn.onclick = () => {
        historyContainer.classList.toggle('hidden');
        resultsArea.classList.add('hidden');
        loadHistory();
    };
    
    printBtn.onclick = async () => { 
        renderPrintArea(); 
        await autoSave(); 
        window.print(); 
    };

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString(); }, 1000);
</script>

</body>
</html>
